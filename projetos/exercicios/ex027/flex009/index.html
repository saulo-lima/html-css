<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>

    <style>
        #container{
            background-color: antiquewhite;
            display: flex;
            flex-flow: row wrap;
        }
        .item {
            background-color: aqua;
            border: 1px solid black ;
            text-align: center;
            flex-basis: 150px;
        }
    </style>
</head>,
<body>

    <div id="container">
        <div class="item">A</div>
        <div class="item">Saulo é a forma Padrão e não coloquial</div>
        <div class="item">C</div>
        <div class="item">Saulão é Aumentativo e coloquial</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">Saulinho é Diminutivo e coloquial</div>
    </div>
    
</body>
</html>
