<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Texto Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="name">Nome:</label>
            <input type="text" name="nome" id="nome" required autocomplete="name" maxlength="30">
        </p>
        <p>
            <label for="media">Média:</label>
            <input type="number" name="media" id="media" required autocomplete="current-password" min="0" max="10" step="0.1">
        </p>
        <p>
            <label for="mes">Período Letivo:</label>
            <input type="month" name="mes" id="mes" value="2026-03">
        </p>
        <p>
            <label for="day">Dia</label>
            <input type="date" name="day" id="day"
            value="2026-03-29">
        </p>
        <p>
            <label for="hora">Hora:</label>
            <input type="time" name="hora" id="hora">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Reset">
        </p>
    </form>


</body>
</html>
