<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de notas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        main{
            height: 100vh;
            position: relative;
        }
        h1{
            text-align: center;
        }
        section#container{
            position: absolute;
            top: 50%;
            left: 50%;
             transform: translate(-50%, -50%);
           
        }
        table{
            border-collapse: collapse;
            margin: auto;
        }
        th, td{
            border:1px solid black;
            padding: 0px 20px;
        }
        
        .hz{
            background-color: gray;
            color: white;
        }
        .dc{
            padding: 20px;
        }
        .nota{
            text-align: center;
        }
    </style>
</head>
<body>
    <main>
        <h1>Média das minhas notas das provas parciais</h1>
        <section id="container">
            <table>
                <tr>
                    <th rowspan="2" class="hz" scope="col">Áreas</th>
                    <th rowspan="2" class="hz" scope="col">Disciplinas</th>
                    <th colspan="2" class="hz" scope="colgroup">Notas</th>
                    <th rowspan="2" class="hz" scope="col">Médias</th>
                </tr>
                <tr>
                    <th class="hz" scope="col">Notas I</th>
                    <th class="hz" scope="col">Notas II</th>
                </tr>
                <tr>
                    <th rowspan="4" class="dc" scope="rowgroup">Exatas</th>
                    <td>Matemática</td>
                    <td class="nota">3,0</td>
                    <td class="nota">2,4</td>
                    <td class="nota">2,7</td>
                </tr>
                <tr>
                    <td>Física</td>
                    <td class="nota">3,0</td>
                    <td class="nota">0</td>
                    <td class="nota">0</td>
                </tr>
                <tr>
                    <td>Química</td>
                    <td class="nota">3,0</td>
                    <td class="nota">3,0</td>
                    <td class="nota">3,0</td>
                </tr>
                <tr>
                    <td>Biologia</td>
                    <td class="nota">3,0</td>
                    <td class="nota">3,0</td>
                    <td class="nota">3,0</td>
                </tr>
                <tr>
                    <th colspan="4" class="hz" scope="row">Média de Exatas</th>
                    <td class="hz nota">-</td>
                </tr>
                <tr>
                    <th rowspan="2" class="dc" scope="rowgroup">Humanas</th>
                    <td>História</td>
                    <td class="nota">2,7</td>
                    <td class="nota">2,6</td>
                    <td class="nota">2,65</td>
                </tr>
                <tr>
                    <td>Filosofia</td>
                    <td colspan="2" class="nota">2,6</td>
                    <td class="nota">2,6</td>
                </tr>
                <tr>
                    <th colspan="4" class="hz" scope="row" >Média de Humanas</th>
                    <td class="hz nota">2,625</td>
                </tr>
            </table>
        </section>
        
    </main>
</body>
</html>
