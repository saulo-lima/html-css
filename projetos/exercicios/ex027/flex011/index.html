<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>

    <style>
        #container{
            background-color: antiquewhite;
            display: flex;
            flex-flow: row nowrap;

        }
        .item {
            background-color: aqua;
            border: 1px solid black ;
            text-align: center;
            flex-basis: 200px;
            flex-shrink: 1;
            flex-grow: 1;
        }
        #a{
            flex-grow: 1;
            flex-shrink: 0;
        }

        #b{
            flex-shrink: 1;
            flex-grow: 1;
        }

        #c{
            flex-shrink: 3;
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="item" id="a">A</div>
        <div class="item" id="b">B</div>
        <div class="item" id="c">C</div>
    </div>
    
</body>
</html>
